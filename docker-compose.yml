version: '3.9'
services:
  model-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MODEL_V1_PATH=models/model_v1.pkl
      - MODEL_V2_PATH=models/model_v2.pkl
      - PREPROCESSOR_PATH=models/preprocessor.pkl
    restart: unless-stopped